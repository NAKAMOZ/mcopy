name: release

# Build release binaries on tested native GitHub-hosted runners and attach the
# packaged outputs to a GitHub Release. Windows embeds its icon/manifest via
# build.rs; macOS is packaged into a proper .app bundle. Code signing /
# notarization is out of scope for now.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-context:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.context.outputs.checkout_ref }}
      tag: ${{ steps.context.outputs.tag }}
      target_commitish: ${{ steps.context.outputs.target_commitish }}
      version: ${{ steps.context.outputs.version }}
    steps:
      - name: Resolve release tag
        id: context
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MANUAL_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$MANUAL_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like vX.Y.Z, got: $tag" >&2
            exit 1
          fi

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag_status="$(
              curl -sS -o /dev/null -w "%{http_code}" \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/git/ref/tags/$tag"
            )"

            case "$tag_status" in
              200)
                checkout_ref="refs/tags/$tag"
                ;;
              404)
                checkout_ref="$GITHUB_SHA"
                echo "Tag $tag does not exist yet; the release will create it from $GITHUB_SHA."
                ;;
              *)
                echo "Could not check release tag $tag; GitHub API returned HTTP $tag_status." >&2
                exit 1
                ;;
            esac
          else
            checkout_ref="$GITHUB_REF"
          fi

          {
            echo "checkout_ref=$checkout_ref"
            echo "tag=$tag"
            echo "target_commitish=$GITHUB_SHA"
            echo "version=${tag#v}"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: release-context
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-context.outputs.checkout_ref }}

      - name: Verify package version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
        run: |
          package_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ "$package_version" != "$RELEASE_VERSION" ]; then
            echo "Cargo.toml version $package_version does not match release version $RELEASE_VERSION." >&2
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked

      - name: Package macOS .app
        if: matrix.name == 'macos'
        run: ./scripts/bundle-macos.sh

      - name: Package Windows binary
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\mcopy.exe dist\mcopy-windows-x86_64.exe
          Compress-Archive -Path dist\mcopy-windows-x86_64.exe -DestinationPath dist\mcopy-windows-x86_64.zip -Force

      - name: Package macOS app
        if: matrix.name == 'macos'
        run: ditto -c -k --sequesterRsrc --keepParent dist/mcopy.app dist/mcopy-macos.zip

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcopy-${{ matrix.name }}
          path: dist/*.zip

  publish:
    needs: [release-context, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-context.outputs.checkout_ref }}

      - name: Extract release notes from CHANGELOG.md
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
        run: |
          version="$RELEASE_VERSION"
          awk -v version="$version" '
            /^##[[:space:]]+/ {
              heading = $0
              sub(/^##[[:space:]]+/, "", heading)
              sub(/[[:space:]].*$/, "", heading)
              gsub(/^\[/, "", heading)
              gsub(/\]$/, "", heading)

              if (in_section) {
                exit
              }

              if (heading == version || heading == "v" version) {
                in_section = 1
              }
            }

            in_section {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "CHANGELOG.md does not contain release notes for ${version}" >&2
            exit 1
          fi

      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          tag_name: ${{ needs.release-context.outputs.tag }}
          target_commitish: ${{ needs.release-context.outputs.target_commitish }}
          files: |
            dist/*.zip
          body_path: release-notes.md
          make_latest: true
