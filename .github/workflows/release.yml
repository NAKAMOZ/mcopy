name: release

# Build release binaries on tested native GitHub-hosted runners and attach the
# packaged outputs to a GitHub Release. Windows embeds its icon/manifest via
# build.rs; macOS is packaged into a proper .app bundle. Code signing /
# notarization is out of scope for now.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to publish, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-context:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.context.outputs.ref }}
      tag: ${{ steps.context.outputs.tag }}
      version: ${{ steps.context.outputs.version }}
    steps:
      - name: Resolve release tag
        id: context
        shell: bash
        env:
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$MANUAL_TAG"
            ref="$MANUAL_TAG"
          else
            tag="$GITHUB_REF_NAME"
            ref="$GITHUB_REF"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like vX.Y.Z, got: $tag" >&2
            exit 1
          fi

          {
            echo "ref=$ref"
            echo "tag=$tag"
            echo "version=${tag#v}"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: release-context
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --locked

      - name: Package macOS .app
        if: matrix.name == 'macos'
        run: ./scripts/bundle-macos.sh

      - name: Package Windows binary
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target\release\mcopy.exe dist\mcopy-windows-x86_64.exe
          Compress-Archive -Path dist\mcopy-windows-x86_64.exe -DestinationPath dist\mcopy-windows-x86_64.zip -Force

      - name: Package macOS app
        if: matrix.name == 'macos'
        run: ditto -c -k --sequesterRsrc --keepParent dist/mcopy.app dist/mcopy-macos.zip

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcopy-${{ matrix.name }}
          path: dist/*.zip

  publish:
    needs: [release-context, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.ref }}

      - name: Extract release notes from CHANGELOG.md
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
        run: |
          version="$RELEASE_VERSION"
          awk -v version="$version" '
            /^##[[:space:]]+/ {
              heading = $0
              sub(/^##[[:space:]]+/, "", heading)
              sub(/[[:space:]].*$/, "", heading)
              gsub(/^\[/, "", heading)
              gsub(/\]$/, "", heading)

              if (in_section) {
                exit
              }

              if (heading == version || heading == "v" version) {
                in_section = 1
              }
            }

            in_section {
              print
            }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "CHANGELOG.md does not contain release notes for ${version}" >&2
            exit 1
          fi

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          tag_name: ${{ needs.release-context.outputs.tag }}
          files: |
            dist/*.zip
          body_path: release-notes.md
          make_latest: true
